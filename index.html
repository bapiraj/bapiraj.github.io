<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keep Calm and Code</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background-color: #f4f4f4;
        }

        /* Header expands full width with reduced height */
        header {
            background-color: #1a3b5d; /* Dark Blue */
            color: white;
            text-align: center;
            padding: 20px 0; /* Reduced height by decreasing padding */
            width: 100%; /* Full width of the screen */
            box-sizing: border-box;
        }

        header h1 {
            margin: 0;
            font-size: 3rem;
        }

        /* Responsive main content area */
        main {
            padding: 20px;
            text-align: center;
            max-width: 90%; /* Limit to 90% width of the screen */
            margin: 0 auto;
            box-sizing: border-box;
        }

        main a {
            display: inline-block;
            padding: 10px 20px;
            background-color: #1a3b5d; /* Dark Blue */
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
            box-sizing: border-box;
        }

        main a:hover {
            background-color: #16324e; /* Slightly darker blue on hover */
        }

        /* Media queries to make adjustments for smaller devices */
        @media (max-width: 768px) {
            header {
                padding: 15px 0; /* Adjust padding for smaller screens */
            }

            header h1 {
                font-size: 2.5rem; /* Adjust font size for tablets */
            }

            main {
                padding: 15px; /* Reduce padding for smaller screens */
            }

            main a {
                padding: 8px 15px; /* Adjust button size on smaller screens */
            }
        }

        @media (max-width: 480px) {
            header {
                padding: 10px 0; /* Even smaller padding for mobile */
            }

            header h1 {
                font-size: 2rem; /* Smaller font size for mobile */
            }

            main a {
                padding: 6px 12px; /* Smaller button size for mobile */
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Keep Calm and Code</h1>
</header>

<main>
    <p>Welcome to my tech blog, where I share insights, tutorials, and tips on coding and software development.</p>
    <p>Check out my latest articles:</p>

    <!-- New link to the PyTorch Neural Network Article -->
    <a href="articles/pytorch-neural-network.html">Building a Simple Neural Network using PyTorch</a>
</main>

</body>
</html>
